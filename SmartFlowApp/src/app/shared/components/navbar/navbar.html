<header class="app-navbar">
  <div class="navbar-left">
    <button class="hamburger-btn" (click)="layoutService.toggleMobile()" title="Menu">
      <i class="bi bi-list"></i>
    </button>
    <h1 class="navbar-page-title">{{ pageTitle }}</h1>
  </div>

  <div class="navbar-right">
    <button class="icon-btn" (click)="themeService.toggle()" [title]="themeService.isDark() ? 'Light mode' : 'Dark mode'">
      <i class="bi" [ngClass]="themeService.isDark() ? 'bi-sun' : 'bi-moon-stars'"></i>
    </button>

    <div class="navbar-user-info">
      <div class="navbar-avatar">{{ getInitials(name) }}</div>
      <div class="navbar-user-text">
        <span class="navbar-user-name">{{ name }}</span>
        <span class="navbar-user-role">{{ getRoleLabel(role) }}</span>
      </div>
    </div>
  </div>
</header>
