<div class="auth-scene">
  <!-- Depth orbs -->
  <div class="auth-bg-orb auth-bg-orb-1"></div>
  <div class="auth-bg-orb auth-bg-orb-2"></div>
  <div class="auth-bg-orb auth-bg-orb-3"></div>
  <div class="auth-grid-overlay"></div>

  <!-- Centered container -->
  <div class="auth-center-wrap">

    <!-- Brand -->
    <div class="auth-brand-header">
      <div class="auth-brand-logo"><i class="bi bi-heart-pulse-fill"></i></div>
      <div class="auth-brand-wordmark">SmartFlow <span class="health-text">Health</span></div>
    </div>

    <!-- Glass card -->
    <div class="auth-glass-card">
      <div class="auth-form-title">Welcome back</div>
      <div class="auth-form-sub">Sign in to your SmartFlow account</div>

      @if (errorMessage) {
        <div class="alert-error"><i class="bi bi-exclamation-triangle"></i> {{ errorMessage }}</div>
      }

      <form (ngSubmit)="submit()">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-icon-wrap">
            <span class="input-icon"><i class="bi bi-envelope"></i></span>
            <input
              type="email"
              class="form-control-custom input-with-icon"
              [(ngModel)]="email"
              name="email"
              placeholder="you@hospital.com"
              autocomplete="email"
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon"><i class="bi bi-lock"></i></span>
            <input
              type="password"
              class="form-control-custom input-with-icon"
              [(ngModel)]="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>
        </div>

        <button
          type="submit"
          class="btn-primary-custom"
          style="width:100%;justify-content:center;padding:13px 20px;font-size:15px;margin-top:8px;"
          [disabled]="loading"
        >
          @if (loading) {
            <span class="spinner" style="width:18px;height:18px;border-width:2px;"></span>
            Signing in...
          } @else {
            Sign In &nbsp;<i class="bi bi-arrow-right"></i>
          }
        </button>
      </form>

      <div class="auth-form-footer">
        <div style="margin-top:16px;">
          New patient? <a routerLink="/signup">Create account</a>
        </div>
      </div>
    </div>

    <!-- Trust chips -->
    <div class="auth-trust-row">
      <div class="auth-trust-chip"><i class="bi bi-shield-check-fill"></i> Secure &amp; encrypted</div>
      <div class="auth-trust-chip"><i class="bi bi-hospital-fill"></i> Hospital grade</div>
      <div class="auth-trust-chip"><i class="bi bi-clock-fill"></i> 24 / 7 access</div>
    </div>

  </div>
</div>
